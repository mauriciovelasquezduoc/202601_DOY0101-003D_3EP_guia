# ══════════════════════════════════════════════════════════════════════════════
# LAB:    kubectl apply -f secret.yaml            → funciona con H2 autónomo
# AWS:    cambiar valores abajo a RDS + recrear    → listo para producción
# ══════════════════════════════════════════════════════════════════════════════
#
# Para AWS RDS, reemplazar los valores y volver a crear el Secret:
#
#   kubectl delete secret alumnos-db-secret -n default
#   kubectl create secret generic alumnos-db-secret \
#     --from-literal=datasource-url="jdbc:mysql://<rds-endpoint>:3306/alumnosdb?useSSL=true&serverTimezone=UTC" \
#     --from-literal=datasource-username="<rds-username>" \
#     --from-literal=datasource-password="<rds-password>" \
#     -n default
#
# Luego en deployment.yaml:
#   - Agregar SPRING_PROFILES_ACTIVE=prod
#   - Quitar el comentario de las variables SPRING_JPA_*
# ══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Secret
metadata:
  name: alumnos-db-secret
  namespace: default
  labels:
    app: alumnos-app
type: Opaque
stringData:
  # ── LAB: H2 en memoria (sin dependencias externas) ─────────────────────────
  datasource-url: "jdbc:h2:mem:alumnosdb;DB_CLOSE_DELAY=-1;MODE=MySQL"
  datasource-username: "sa"
  datasource-password: ""
