name: CI/CD Pipeline — Alumnos API (Maven)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/alumnos-app

# ─────────────────────────────────────────────────────────────────────────────
# JOB 0: CODE QUALITY — OpenRewrite + Spotless + PMD
# Verifica calidad y formato del código ANTES de compilar o testear.
# Si falla aquí, el desarrollador debe correr localmente:
#   ./mvnw rewrite:run spotless:apply   → aplica correcciones automáticas
#   ./mvnw pmd:pmd                      → ver violaciones PMD
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  code-quality:
    name: Code Quality (OpenRewrite + Spotless + PMD)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos al mvnw
        run: chmod +x mvnw

      - name: OpenRewrite — verificar recetas pendientes (dry-run)
        run: ./mvnw rewrite:dryRun -B
        # Falla si hay cambios que OpenRewrite aplicaría → el dev debe correr rewrite:run

      - name: Spotless — verificar formato del código
        run: ./mvnw spotless:check -B
        # Falla si el código no está formateado → el dev debe correr spotless:apply

      - name: PMD — análisis estático de reglas
        run: ./mvnw pmd:check -B
        # Falla si hay violaciones de las reglas definidas en config/pmd/ruleset.xml

      - name: Publicar reporte PMD como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pmd-report
          path: |
            target/pmd.xml
            target/site/pmd.html
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: BUILD & TEST
# Compila el proyecto, ejecuta todos los tests y verifica cobertura ≥ 80%
# ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: code-quality  # solo corre si la calidad de código pasa

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # necesario para SonarCloud (análisis de historial)

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos al mvnw
        run: chmod +x mvnw

      - name: Compilar y ejecutar todos los tests
        run: ./mvnw clean verify -B
        # verify ejecuta: test → jacoco:report → jacoco:check (≥80%)

      - name: Publicar reporte contractTest como artefacto (diagnóstico)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-report
          path: target/failsafe-reports/
          retention-days: 7

      - name: Publicar reporte de cobertura JaCoCo como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: |
            target/site/jacoco/
            target/site/jacoco/jacoco.xml
          retention-days: 7

      - name: Publicar resultados de tests como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

      - name: Publicar reporte Cucumber como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: target/cucumber-reports/
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: SECURITY — SonarCloud + Snyk
# Análisis estático de código y escaneo de vulnerabilidades en dependencias
# El pipeline se BLOQUEA si alguno falla
# ─────────────────────────────────────────────────────────────────────────────
  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: build-and-test  # solo corre si los tests pasan

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos al mvnw
        run: chmod +x mvnw

      - name: Compilar para análisis (sin tests)
        run: ./mvnw clean compile -B

      # ── Descargar reporte JaCoCo del job anterior ─────────────────────────
      - name: Descargar reporte JaCoCo
        uses: actions/download-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
        continue-on-error: true  # no falla si el artefacto no existe aún

      # ── SAST: SonarCloud ──────────────────────────────────────────────────
      - name: Análisis SonarCloud (SAST)
        run: |
          ./mvnw sonar:sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=false \
            -B
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # projectKey y organization vienen del pom.xml (properties)

      # ── SCA: Snyk (escaneo de dependencias) ───────────────────────────────
      - name: Instalar Snyk CLI
        run: npm install -g snyk@latest

      - name: Escaneo de dependencias Snyk (SCA)
        run: |
          snyk test \
            --severity-threshold=high \
            --fail-on=all
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # Snyk detecta automáticamente el proyecto Maven (pom.xml)
        # --fail-on=all → BLOQUEA el pipeline si hay vulnerabilidades high/critical

      - name: Generar reporte Snyk SARIF
        if: always()
        run: |
          snyk test \
            --severity-threshold=high \
            --sarif-file-output=snyk.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Publicar reporte Snyk como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-security-report
          path: snyk.sarif
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: DOCKER — Build y push de imagen al registry
# ─────────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: security  # solo corre si seguridad pasa

    permissions:
      contents: read
      packages: write  # necesario para push a GHCR

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21 (para generar el jar)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos al mvnw
        run: chmod +x mvnw

      - name: Generar jar de producción
        run: ./mvnw clean package -DskipTests -B

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata para la imagen Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build y push de imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4: DEPLOY — Despliegue automático con Docker Compose
# Solo se ejecuta en push a main (entorno de producción simulado)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy (Docker Compose)
    runs-on: ubuntu-latest
    needs: docker  # solo corre si la imagen fue publicada
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: http://localhost:8080

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos al mvnw
        run: chmod +x mvnw

      - name: Generar jar de producción
        run: ./mvnw clean package -DskipTests -B

      - name: Levantar entorno con Docker Compose
        run: docker compose up -d --build
        env:
          SPRING_PROFILES_ACTIVE: prod

      - name: Esperar que la aplicación esté healthy
        run: |
          echo "Esperando que la aplicación levante..."
          for i in $(seq 1 12); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' alumnos-app 2>/dev/null || echo "starting")
            echo "Intento $i/12 — Estado: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "Aplicación lista."
              exit 0
            fi
            sleep 10
          done
          echo "La aplicación no levantó en tiempo esperado."
          docker compose logs
          exit 1

      - name: Smoke test — verificar endpoint principal
        run: |
          curl -f http://localhost:8080/alumnos \
            -H "Accept: application/json" \
            --retry 3 --retry-delay 5
          echo "Smoke test OK"

      - name: Publicar logs del despliegue como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-logs
          path: /tmp/deploy-logs.txt
          retention-days: 3

      - name: Detener entorno Docker Compose (cleanup)
        if: always()
        run: docker compose down -v
