apiVersion: apps/v1
kind: Deployment
metadata:
  name: alumnos-backend
  namespace: alumnos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alumnos-backend
  template:
    metadata:
      labels:
        app: alumnos-backend
    spec:
      containers:
        - name: backend
          image: 461663648686.dkr.ecr.us-east-1.amazonaws.com/alumnos-backend:eks-v1
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"

          # Se agrega Resource para que Metrics Server calcule el % de CPU y Memoria para escalar 
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # HEALTH CHECKS (PROBES)
          # La app tarda ~40s en arrancar (Spring Boot + dependencias)
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3